<svg width="680" height="820" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:system-ui,sans-serif">
<title>Minutely Architecture Diagram</title>
<desc>End-to-end architecture: user upload, 6-agent Qwen Cloud pipeline, cross-session memory, MCP tool dispatch, Supabase persistence.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, sans-serif; fill: #1a1a1a; }
    .th { font-size:14px; font-weight:600; }
    .ts { font-size:12px; fill:#555; }
    .tier { font-size:11px; fill:#999; }
    .box-gray   { fill:#f3f2ef; stroke:#aaa; }
    .box-purple { fill:#EEEDFE; stroke:#7F77DD; }
    .box-teal   { fill:#E1F5EE; stroke:#1D9E75; }
    .box-coral  { fill:#FAECE7; stroke:#D85A30; }
    .box-amber  { fill:#FAEEDA; stroke:#BA7517; }
    .box-blue   { fill:#E6F1FB; stroke:#378ADD; }
    .box-green  { fill:#EAF3DE; stroke:#639922; }
    .lbl-purple { fill:#3C3489; }
    .lbl-teal   { fill:#0F6E56; }
    .lbl-coral  { fill:#993C1D; }
    .lbl-amber  { fill:#854F0B; }
    .lbl-blue   { fill:#185FA5; }
    .lbl-green  { fill:#3B6D11; }
    .lbl-gray   { fill:#444441; }
    .div { stroke:#ddd; stroke-width:0.5; stroke-dasharray:4 4; }
    .arr { stroke:#888; stroke-width:0.5; fill:none; }
    .arr-dash { stroke:#bbb; stroke-width:0.5; fill:none; stroke-dasharray:4 3; }
  </style>
</defs>

<!-- Tier labels -->
<text class="tier" x="30" y="95" text-anchor="middle" transform="rotate(-90,30,95)">Client</text>
<text class="tier" x="30" y="280" text-anchor="middle" transform="rotate(-90,30,280)">API layer</text>
<text class="tier" x="30" y="495" text-anchor="middle" transform="rotate(-90,30,495)">Agents</text>
<text class="tier" x="30" y="685" text-anchor="middle" transform="rotate(-90,30,685)">Tools / DB</text>

<!-- Dividers -->
<line x1="50" y1="145" x2="640" y2="145" class="div"/>
<line x1="50" y1="375" x2="640" y2="375" class="div"/>
<line x1="50" y1="610" x2="640" y2="610" class="div"/>

<!-- ── TIER 1: Client ── -->
<rect x="64" y="36" width="150" height="88" rx="8" stroke-width="0.5" class="box-gray"/>
<text class="th lbl-gray" x="139" y="72" text-anchor="middle">Upload zone</text>
<text class="ts" x="139" y="90" text-anchor="middle">Drag or paste</text>
<text class="ts" x="139" y="106" text-anchor="middle">transcript text</text>

<rect x="264" y="36" width="166" height="88" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="th lbl-purple" x="347" y="64" text-anchor="middle">Results dashboard</text>
<text class="ts" x="347" y="82" text-anchor="middle">9 tabs: summary,</text>
<text class="ts" x="347" y="98" text-anchor="middle">sprints, blockers…</text>
<text class="ts" x="347" y="114" text-anchor="middle">+ AI chat panel</text>

<rect x="474" y="36" width="158" height="88" rx="8" stroke-width="0.5" class="box-coral"/>
<text class="th lbl-coral" x="553" y="62" text-anchor="middle">HITL approval</text>
<text class="ts" x="553" y="80" text-anchor="middle">Review modal</text>
<text class="ts" x="553" y="97" text-anchor="middle">before each send —</text>
<text class="ts" x="553" y="114" text-anchor="middle">Track 4 checkpoint</text>

<line x1="214" y1="80" x2="258" y2="80" class="arr" marker-end="url(#arrow)"/>
<line x1="430" y1="80" x2="468" y2="80" class="arr" marker-end="url(#arrow)"/>

<!-- ── TIER 2: API ── -->
<rect x="64" y="164" width="140" height="56" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="th lbl-teal" x="134" y="188" text-anchor="middle">/api/analyze</text>
<text class="ts" x="134" y="206" text-anchor="middle">Agentic pipeline</text>

<rect x="236" y="164" width="128" height="56" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="th lbl-teal" x="300" y="188" text-anchor="middle">/api/chat</text>
<text class="ts" x="300" y="206" text-anchor="middle">Patch + persist</text>

<rect x="388" y="164" width="158" height="56" rx="8" stroke-width="0.5" class="box-coral"/>
<text class="th lbl-coral" x="467" y="188" text-anchor="middle">/api/send-followup</text>
<text class="ts" x="467" y="206" text-anchor="middle">Tool-call dispatch</text>

<rect x="570" y="164" width="62" height="56" rx="8" stroke-width="0.5" class="box-blue"/>
<text class="th lbl-blue" x="601" y="188" text-anchor="middle">/api</text>
<text class="ts" x="601" y="206" text-anchor="middle">/memory</text>

<line x1="139" y1="124" x2="139" y2="158" class="arr" marker-end="url(#arrow)"/>
<line x1="347" y1="124" x2="300" y2="158" class="arr" marker-end="url(#arrow)"/>
<line x1="553" y1="124" x2="500" y2="158" class="arr" marker-end="url(#arrow)"/>
<line x1="204" y1="185" x2="230" y2="185" class="arr-dash" marker-end="url(#arrow)"/>

<!-- ── TIER 3: Agents ── -->
<rect x="64" y="392" width="540" height="202" rx="12" fill="none" stroke="#ddd" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="ts" style="fill:#bbb" x="86" y="410">orchestrator.ts — 6-agent pipeline (Agent 1 serial → Agents 2-6 parallel via Promise.allSettled)</text>

<rect x="80" y="420" width="150" height="70" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="th lbl-purple" x="155" y="448" text-anchor="middle">Agent 1</text>
<text class="ts" x="155" y="465" text-anchor="middle">Analysis</text>
<text class="ts" x="155" y="479" text-anchor="middle">+ memory inject</text>

<rect x="254" y="420" width="86" height="70" rx="8" stroke-width="0.5" class="box-amber"/>
<text class="th lbl-amber" x="297" y="448" text-anchor="middle">Agent 2</text>
<text class="ts" x="297" y="465" text-anchor="middle">Blocker</text>
<text class="ts" x="297" y="479" text-anchor="middle">detection</text>

<rect x="350" y="420" width="78" height="70" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="th lbl-teal" x="389" y="448" text-anchor="middle">Agent 3</text>
<text class="ts" x="389" y="465" text-anchor="middle">Sprint</text>
<text class="ts" x="389" y="479" text-anchor="middle">planner</text>

<rect x="438" y="420" width="78" height="70" rx="8" stroke-width="0.5" class="box-blue"/>
<text class="th lbl-blue" x="477" y="448" text-anchor="middle">Agent 4</text>
<text class="ts" x="477" y="465" text-anchor="middle">Workflow</text>
<text class="ts" x="477" y="479" text-anchor="middle">DAG</text>

<rect x="526" y="420" width="62" height="70" rx="8" stroke-width="0.5" class="box-green"/>
<text class="th lbl-green" x="557" y="448" text-anchor="middle">Ag 5</text>
<text class="ts" x="557" y="465" text-anchor="middle">Action</text>
<text class="ts" x="557" y="479" text-anchor="middle">plan</text>

<rect x="526" y="510" width="62" height="68" rx="8" stroke-width="0.5" class="box-coral"/>
<text class="th lbl-coral" x="557" y="535" text-anchor="middle">Ag 6</text>
<text class="ts" x="557" y="552" text-anchor="middle">Follow</text>
<text class="ts" x="557" y="568" text-anchor="middle">-up</text>

<line x1="139" y1="220" x2="139" y2="388" class="arr" marker-end="url(#arrow)"/>
<line x1="230" y1="455" x2="248" y2="455" class="arr" marker-end="url(#arrow)"/>
<line x1="230" y1="455" x2="344" y2="455" class="arr" marker-end="url(#arrow)"/>
<line x1="230" y1="455" x2="432" y2="455" class="arr" marker-end="url(#arrow)"/>
<line x1="230" y1="455" x2="520" y2="455" class="arr" marker-end="url(#arrow)"/>
<line x1="557" y1="490" x2="557" y2="504" class="arr" marker-end="url(#arrow)"/>

<!-- ── TIER 4: Tools / DB ── -->
<rect x="64" y="630" width="152" height="72" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="th lbl-purple" x="140" y="656" text-anchor="middle">Qwen Cloud</text>
<text class="ts" x="140" y="673" text-anchor="middle">qwen-plus / qwen-max</text>
<text class="ts" x="140" y="689" text-anchor="middle">dashscope-intl API</text>

<rect x="236" y="630" width="130" height="72" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="th lbl-teal" x="301" y="654" text-anchor="middle">Supabase</text>
<text class="ts" x="301" y="671" text-anchor="middle">meetings, memory,</text>
<text class="ts" x="301" y="689" text-anchor="middle">action_checkpoints</text>

<rect x="386" y="630" width="140" height="72" rx="8" stroke-width="0.5" class="box-coral"/>
<text class="th lbl-coral" x="456" y="652" text-anchor="middle">MCP tools</text>
<text class="ts" x="456" y="670" text-anchor="middle">email_send</text>
<text class="ts" x="456" y="686" text-anchor="middle">calendar_create_event</text>
<text class="ts" x="456" y="702" text-anchor="middle">slack_notify</text>

<rect x="546" y="630" width="88" height="72" rx="8" stroke-width="0.5" class="box-gray"/>
<text class="th lbl-gray" x="590" y="656" text-anchor="middle">Clerk</text>
<text class="ts" x="590" y="674" text-anchor="middle">Auth &amp; user</text>
<text class="ts" x="590" y="692" text-anchor="middle">identity</text>

<line x1="155" y1="592" x2="155" y2="624" class="arr" marker-end="url(#arrow)"/>
<line x1="300" y1="592" x2="300" y2="624" class="arr" marker-end="url(#arrow)"/>
<path d="M467 220 L467 624" class="arr-dash" marker-end="url(#arrow)"/>
<path d="M601 220 L601 595 L370 666" class="arr-dash" marker-end="url(#arrow)"/>
<path d="M204 192 L590 192 L590 624" class="arr-dash" marker-end="url(#arrow)"/>

<!-- Legend -->
<rect x="64" y="762" width="10" height="10" rx="2" class="box-teal"/>
<text class="ts" x="82" y="770">Next.js API route</text>
<rect x="182" y="762" width="10" height="10" rx="2" class="box-purple"/>
<text class="ts" x="200" y="770">LLM agent</text>
<rect x="278" y="762" width="10" height="10" rx="2" class="box-coral"/>
<text class="ts" x="296" y="770">HITL / tool layer</text>
<rect x="400" y="762" width="10" height="10" rx="2" class="box-blue"/>
<text class="ts" x="418" y="770">Memory / persistence</text>
<line x1="530" y1="767" x2="556" y2="767" class="arr-dash"/>
<text class="ts" x="564" y="770">async</text>
</svg>
